```html
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>施設見学候補地マップ</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    #sidebar {
      width: 420px;
      background: white;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 20px;
    }

    #map {
      flex: 1;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .facility-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .facility-card:hover {
      background: #f5f5f5;
    }

    .facility-image {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 16px;
      max-height: 240px;
      object-fit: cover;
    }

    .facility-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .catch-copy {
      color: #666;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .access-box {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 14px;
      margin-top: 16px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #222;
      color: white;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .link-button {
      display: inline-block;
      margin-top: 14px;
      margin-right: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #222;
      color: white;
      text-decoration: none;
    }

    .link-button:hover {
      opacity: 0.9;
    }

    hr {
      margin: 20px 0;
    }

    @media (max-width: 900px) {

      body {
        flex-direction: column;
      }

      #sidebar {
        width: 100%;
        height: 45vh;
      }

      #map {
        height: 55vh;
      }

    }

  </style>

</head>

<body>

<div id="sidebar">

  <h1>施設見学候補地</h1>

  <div class="controls">

    <select id="areaFilter">
      <option value="all">全エリア</option>
      <option value="関東">関東</option>
      <option value="関西">関西</option>
      <option value="九州">九州</option>
    </select>

    <select id="sortSelect">
      <option value="default">並び替えなし</option>
      <option value="time">所要時間順</option>
    </select>

  </div>

  <div id="facilityList"></div>

  <hr>

  <div id="facilityInfo">
    地図上のピンを選択してください。
  </div>

</div>

<div id="map"></div>

<script>

  // =====================================
  // 地図初期化
  // =====================================

  const map = L.map('map').setView([36.0, 137.0], 5);

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution:
        '&copy; OpenStreetMap contributors'
    }
  ).addTo(map);

  // =====================================
  // 施設データ
  // =====================================

  const facilities = [

    {
      name: '大谷資料館',
      area: '関東',
      lat: 36.5986,
      lng: 139.8507,
      website: 'https://www.oya909.co.jp/',
      image: 'https://images.unsplash.com/photo-1511818966892-d7d671e672a2?q=80&w=1200&auto=format&fit=crop',
      catch: '巨大地下空間を体感できる石採掘場跡',
      booking: '△ 団体予約推奨',
      access: {
        time: '1時間50分',
        minutes: 110,
        cost: '約6000円',
        route: '東京駅 → 宇都宮駅 → 関東バス'
      }
    },

    {
      name: 'TOTOミュージアム',
      area: '九州',
      lat: 33.8807,
      lng: 130.8743,
      website: 'https://museum.toto.jp/',
      image: 'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop',
      catch: '日本の水まわり文化と技術革新を体感',
      booking: '◎ 比較的予約容易',
      access: {
        time: '5時間',
        minutes: 300,
        cost: '約25000円',
        route: '東京駅 → 小倉駅 → 徒歩'
      }
    },

    {
      name: '舞洲工場',
      area: '関西',
      lat: 34.6541,
      lng: 135.3895,
      website: 'https://www.osaka-env-paa.jp/kengaku/factoryTour.html',
      image: 'https://images.unsplash.com/photo-1487958449943-2429e8be8625?q=80&w=1200&auto=format&fit=crop',
      catch: '芸術作品のような外観を持つ清掃工場',
      booking: '△ 団体予約',
      access: {
        time: '4時間',
        minutes: 240,
        cost: '約16000円',
        route: '東京駅 → 新大阪駅 → バス'
      }
    },

    {
      name: '首都圏外郭放水路',
      area: '関東',
      lat: 35.9873,
      lng: 139.8203,
      website: 'https://gaikaku.jp/',
      image: 'https://images.unsplash.com/photo-1518005020951-eccb494ad742?q=80&w=1200&auto=format&fit=crop',
      catch: '地下神殿とも呼ばれる巨大インフラ空間',
      booking: '△ 要事前予約',
      access: {
        time: '1時間40分',
        minutes: 100,
        cost: '約2500円',
        route: '東京駅 → 春日部駅 → バス'
      }
    }

  ];

  // =====================================
  // マーカー管理
  // =====================================

  let markers = [];

  function renderFacilities(data) {

    const list =
      document.getElementById('facilityList');

    list.innerHTML = '';

    data.forEach(facility => {

      const card = document.createElement('div');

      card.className = 'facility-card';

      card.innerHTML = `
        <strong>${facility.name}</strong><br><br>
        ${facility.catch}<br><br>
        エリア：${facility.area}<br>
        所要時間：約${facility.access.time}
      `;

      card.onclick = () => {

        showFacilityInfo(facility);

        map.setView(
          [facility.lat, facility.lng],
          10
        );

      };

      list.appendChild(card);

    });

  }

  function renderMarkers(data) {

    markers.forEach(marker => {
      map.removeLayer(marker);
    });

    markers = [];

    data.forEach(facility => {

      const marker = L.marker([
        facility.lat,
        facility.lng
      ]).addTo(map);

      marker.on('click', () => {

        showFacilityInfo(facility);

        map.setView(
          [facility.lat, facility.lng],
          10
        );

      });

      markers.push(marker);

    });

  }

  function showFacilityInfo(facility) {

    const info =
      document.getElementById('facilityInfo');

    const googleMapsUrl =
      `https://www.google.com/maps/search/?api=1&query=${facility.lat},${facility.lng}`;

    info.innerHTML = `

      <img
        src="${facility.image}"
        class="facility-image"
      >

      <div class="badge">
        予約難易度：${facility.booking}
      </div>

      <div class="facility-title">
        ${facility.name}
      </div>

      <div class="catch-copy">
        ${facility.catch}
      </div>

      <div class="access-box">

        <h3>東京駅からのアクセス</h3>

        <p>
          <strong>所要時間：</strong>
          ${facility.access.time}
        </p>

        <p>
          <strong>料金：</strong>
          ${facility.access.cost}
        </p>

        <p>
          <strong>経路：</strong>
          ${facility.access.route}
        </p>

      </div>

      <a
        href="${facility.website}"
        target="_blank"
        class="link-button"
      >
        公式サイト
      </a>

      <a
        href="${googleMapsUrl}"
        target="_blank"
        class="link-button"
      >
        Google Maps
      </a>

    `;

  }

  function applyFilters() {

    const area =
      document.getElementById('areaFilter').value;

    const sort =
      document.getElementById('sortSelect').value;

    let filtered = [...facilities];

    // エリアフィルタ

    if (area !== 'all') {

      filtered =
        filtered.filter(f =>
          f.area === area
        );

    }

    // 所要時間順ソート

    if (sort === 'time') {

      filtered.sort((a, b) =>
        a.access.minutes -
        b.access.minutes
      );

    }

    renderFacilities(filtered);
    renderMarkers(filtered);

  }

  // =====================================
  // イベント
  // =====================================

  document
    .getElementById('areaFilter')
    .addEventListener(
      'change',
      applyFilters
    );

  document
    .getElementById('sortSelect')
    .addEventListener(
      'change',
      applyFilters
    );

  // =====================================
  // 初期表示
  // =====================================

  renderFacilities(facilities);
  renderMarkers(facilities);

</script>

</body>
</html>
```
