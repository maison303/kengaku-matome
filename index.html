<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>施設見学 候補地マップ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Shippori+Mincho:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --ink: #1c1a14;
      --ink-light: #5c5748;
      --paper: #f7f5ee;
      --paper-dark: #eeebe0;
      --accent: #c0392b;
      --accent2: #2563a8;
      --gold: #b8933f;
      --border: rgba(28,26,20,0.12);
      --shadow: 0 4px 24px rgba(28,26,20,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', serif;
      background: var(--paper);
      color: var(--ink);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 54px;
      background: var(--ink);
      color: var(--paper);
      gap: 1rem;
    }
    .header-title { display: flex; align-items: baseline; gap: 0.75rem; }
    .header-title h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: 17px; font-weight: 700;
      letter-spacing: 0.04em; white-space: nowrap;
    }
    .header-title span {
      font-size: 12px; color: rgba(247,245,238,0.45);
      font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em;
    }
    .header-count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--gold); white-space: nowrap; }
    .add-facility-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 4px;
      font-family: 'Noto Serif JP', serif; font-size: 12px;
      cursor: pointer; white-space: nowrap; transition: background 0.15s;
    }
    .add-facility-btn:hover { background: #a93226; }
    .main { flex: 1; display: flex; overflow: hidden; position: relative; }
    #map { flex: 1; z-index: 0; }
    .sidebar {
      width: 340px; flex-shrink: 0;
      background: var(--paper); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-content { height: 100%; display: flex; flex-direction: column; }
    .sidebar-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%;
      gap: 1rem; padding: 2rem; text-align: center;
    }
    .sidebar-placeholder .icon { font-size: 48px; opacity: 0.2; }
    .sidebar-placeholder p { font-size: 14px; color: var(--ink-light); line-height: 1.7; }
    .detail-panel { display: none; flex-direction: column; height: 100%; overflow: hidden; }
    .detail-panel.active { display: flex; }
    .detail-image {
      position: relative; height: 180px; overflow: hidden;
      flex-shrink: 0; background: var(--paper-dark);
    }
    .detail-image img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.4s ease;
    }
    .detail-image:hover img { transform: scale(1.04); }
    .detail-image-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 64px; opacity: 0.15;
    }
    .detail-cat {
      position: absolute; top: 12px; left: 12px;
      background: var(--ink); color: var(--gold);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; padding: 3px 8px; letter-spacing: 0.08em;
    }
    .detail-scroll {
      flex: 1; overflow-y: auto; padding: 1.25rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .detail-scroll::-webkit-scrollbar { width: 4px; }
    .detail-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .detail-name {
      font-family: 'Shippori Mincho', serif;
      font-size: 20px; font-weight: 700; line-height: 1.35; color: var(--ink);
    }
    .detail-tagline {
      font-size: 13px; color: var(--accent); font-weight: 600;
      line-height: 1.6; padding: 0.6rem 0.9rem;
      background: #fdf0ee; border-left: 3px solid var(--accent);
    }
    .access-section {
      background: var(--paper-dark); border-radius: 6px;
      padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem;
    }
    .access-title {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.1em; color: var(--ink-light); text-transform: uppercase;
    }
    .access-row { display: flex; align-items: flex-start; gap: 10px; }
    .access-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .access-info { display: flex; flex-direction: column; gap: 2px; }
    .access-label { font-size: 12px; color: var(--ink-light); }
    .access-value { font-size: 13px; font-weight: 600; color: var(--ink); }
    .access-sub { font-size: 11px; color: var(--ink-light); font-family: 'JetBrains Mono', monospace; }
    .detail-actions { display: flex; gap: 8px; padding-top: 4px; }
    .btn-official {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 10px; background: var(--ink); color: var(--paper);
      border: none; border-radius: 4px; font-family: 'Noto Serif JP', serif;
      font-size: 13px; cursor: pointer; text-decoration: none; transition: background 0.15s;
    }
    .btn-official:hover { background: #333; }
    .btn-close {
      width: 40px; display: flex; align-items: center; justify-content: center;
      background: var(--paper-dark); border: 1px solid var(--border);
      border-radius: 4px; font-size: 18px; cursor: pointer;
      color: var(--ink-light); transition: background 0.15s;
    }
    .btn-close:hover { background: #e8e4d8; color: var(--ink); }
    /* Filter bar buttons */
    .fsort-btn {
      font-size: 11px; padding: 3px 9px;
      border-radius: 3px; border: 1px solid var(--border);
      background: #fff; color: var(--ink-light);
      font-family: 'Noto Serif JP', serif;
      cursor: pointer; white-space: nowrap; transition: all .15s;
    }
    .fsort-btn:hover { background: var(--paper-dark); color: var(--ink); }
    .fsort-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .farea-btn {
      font-size: 11px; padding: 3px 9px;
      border-radius: 3px; border: 1px solid var(--border);
      background: #fff; color: var(--ink-light);
      font-family: 'Noto Serif JP', serif;
      cursor: pointer; white-space: nowrap; transition: all .15s;
    }
    .farea-btn:hover { background: var(--paper-dark); color: var(--ink); }
    .farea-btn.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
    /* List item */
    .list-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .12s;
    }
    .list-item:hover { background: var(--paper-dark); }
    .list-item.selected { background: #fdf0ee; }
    .list-item-emoji { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
    .list-item-info { flex: 1; min-width: 0; }
    .list-item-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item-sub { font-size: 11px; color: var(--ink-light); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
    .list-group-header {
      padding: 6px 14px 4px;
      font-size: 10px; font-family: 'JetBrains Mono', monospace;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--ink-light); background: var(--paper-dark);
      border-bottom: 1px solid var(--border); border-top: 1px solid var(--border);
      margin-top: 2px;
    }
    .delete-fac-btn {
      font-size: 11px; padding: 4px 10px; background: none;
      border: 1px solid #e8c0be; border-radius: 4px; color: var(--accent);
      cursor: pointer; font-family: 'Noto Serif JP', serif;
      transition: background 0.15s; margin-top: 4px; align-self: flex-start;
    }
    .delete-fac-btn:hover { background: #fdf0ee; }

    /* ── Heart rating ── */
    .heart-rating {
      display: flex; align-items: center; gap: 8px;
      padding: 0.75rem 1rem;
      background: #fff8f8; border: 1px solid #f5d0d0;
      border-radius: 6px;
    }
    .heart-rating-label {
      font-size: 11px; color: var(--ink-light);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: .06em; white-space: nowrap;
    }
    .hearts {
      display: flex; gap: 3px; cursor: pointer;
    }
    .heart {
      font-size: 20px; line-height: 1;
      transition: transform 0.12s;
      user-select: none;
    }
    .heart:hover { transform: scale(1.25); }
    .heart-filled { color: #e74c3c; }
    .heart-empty  { color: #ddd; }
    .heart-score-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: #e74c3c; margin-left: 2px; white-space: nowrap;
    }
    .list-item-hearts { font-size: 12px; letter-spacing: -1px; }
    .list-rank {
      flex-shrink: 0; width: 22px; text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 700; color: var(--gold);
    }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(28,26,20,0.7); z-index: 9000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--paper); border-radius: 8px;
      width: 90%; max-width: 480px; max-height: 85vh;
      overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--paper); z-index: 1;
    }
    .modal-header h2 { font-family: 'Shippori Mincho', serif; font-size: 16px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink-light); line-height: 1; }
    .modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 11px; color: var(--ink-light);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .form-group input, .form-group textarea, .form-group select {
      padding: 9px 12px; border: 1px solid var(--border); border-radius: 4px;
      font-family: 'Noto Serif JP', serif; font-size: 14px;
      background: #fff; color: var(--ink); outline: none; transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(37,99,168,0.1);
    }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .modal-footer {
      padding: 1rem 1.5rem; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px;
      position: sticky; bottom: 0; background: var(--paper);
    }
    .btn-cancel {
      padding: 8px 20px; background: none;
      border: 1px solid var(--border); border-radius: 4px;
      font-family: 'Noto Serif JP', serif; font-size: 14px;
      cursor: pointer; color: var(--ink-light);
    }
    .btn-cancel:hover { background: var(--paper-dark); }
    .btn-submit {
      padding: 8px 24px; background: var(--accent); color: #fff;
      border: none; border-radius: 4px; font-family: 'Noto Serif JP', serif;
      font-size: 14px; cursor: pointer; transition: background 0.15s;
    }
    .btn-submit:hover { background: #a93226; }
    /* Leaflet */
    .lf-marker {
      width: 30px; height: 30px;
      background: var(--ink); border: 2.5px solid white;
      border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s, transform 0.2s;
    }
    .lf-marker-inner { transform: rotate(45deg); font-size: 12px; }
    .leaflet-popup-content-wrapper {
      background: var(--ink); color: var(--paper);
      border-radius: 4px; box-shadow: var(--shadow);
      font-family: 'Noto Serif JP', serif;
    }
    .leaflet-popup-content { margin: 10px 14px; font-size: 13px; line-height: 1.5; }
    .leaflet-popup-tip { background: var(--ink); }
    .leaflet-popup-close-button { color: var(--paper) !important; }
    @media (max-width: 768px) {
      .sidebar {
        position: absolute; right: 0; top: 0; bottom: 0;
        z-index: 500; transform: translateX(100%);
        transition: transform 0.3s ease; width: 85vw; max-width: 340px;
      }
      .sidebar.open { transform: translateX(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>施設見学 候補地マップ</h1>
    <span>FACILITY TOUR CANDIDATES</span>
  </div>
  <div style="display:flex;align-items:center;gap:1rem;">
    <span class="header-count" id="fac-count">— 件</span>
    <button class="add-facility-btn" onclick="openModal()">＋ 施設を追加</button>
  </div>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-content">
      <!-- Filter bar -->
      <div id="filter-bar" style="flex-shrink:0;padding:10px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px;background:var(--paper-dark);">
        <div style="display:flex;gap:6px;align-items:center;">
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-light);letter-spacing:.08em;white-space:nowrap;">人気順</span>
          <div style="display:flex;gap:4px;flex-wrap:wrap;">
            <button class="fsort-btn active" data-sort="default" onclick="setSort('default',this)">登録順</button>
            <button class="fsort-btn" data-sort="name" onclick="setSort('name',this)">名前順</button>
            <button class="fsort-btn" data-sort="area" onclick="setSort('area',this)">エリア順</button>
            <button class="fsort-btn" data-sort="cat" onclick="setSort('cat',this)">カテゴリ順</button>
            <button class="fsort-btn" data-sort="vote" onclick="setSort('vote',this)">人気順</button>
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-light);letter-spacing:.08em;white-space:nowrap;">エリア</span>
          <div style="display:flex;gap:4px;flex-wrap:wrap;" id="area-filters"></div>
        </div>
      </div>
      <!-- List view (shown when sort active) -->
      <div id="list-view" style="flex:1;overflow-y:auto;display:none;flex-direction:column;"></div>
      <div class="sidebar-placeholder" id="sidebar-placeholder">
        <div class="icon">📍</div>
        <p>地図上のピンを選択すると<br>施設の詳細が表示されます</p>
      </div>
      <div class="detail-panel" id="detail-panel">
        <div class="detail-image" id="detail-image-wrap">
          <div class="detail-image-placeholder" id="detail-img-placeholder">🏛</div>
          <img id="detail-img" src="" alt=""
            style="display:none;"
            onload="this.style.display='block'; document.getElementById('detail-img-placeholder').style.display='none';"
            onerror="this.style.display='none'; document.getElementById('detail-img-placeholder').style.display='flex';">
          <div class="detail-cat" id="detail-cat">施設</div>
        </div>
        <div class="detail-scroll">
          <div class="detail-name" id="detail-name">—</div>
          <div class="detail-tagline" id="detail-tagline">—</div>
          <div class="heart-rating">
            <span class="heart-rating-label">評価</span>
            <div class="hearts" id="heart-input">
              <span class="heart heart-empty" data-v="1" onclick="setVote(currentFacId,1)">♡</span>
              <span class="heart heart-empty" data-v="2" onclick="setVote(currentFacId,2)">♡</span>
              <span class="heart heart-empty" data-v="3" onclick="setVote(currentFacId,3)">♡</span>
              <span class="heart heart-empty" data-v="4" onclick="setVote(currentFacId,4)">♡</span>
              <span class="heart heart-empty" data-v="5" onclick="setVote(currentFacId,5)">♡</span>
              <span class="heart heart-empty" data-v="6" onclick="setVote(currentFacId,6)">♡</span>
              <span class="heart heart-empty" data-v="7" onclick="setVote(currentFacId,7)">♡</span>
            </div>
            <span class="heart-score-badge" id="heart-score-label"></span>
          </div>
          <div class="access-section">
            <div class="access-title">🚃 東京駅からのアクセス</div>
            <div class="access-row">
              <span class="access-icon">🚄</span>
              <div class="access-info">
                <span class="access-label">交通手段</span>
                <span class="access-value" id="acc-transport">—</span>
                <span class="access-sub" id="acc-time"></span>
              </div>
            </div>
            <div class="access-row">
              <span class="access-icon">💴</span>
              <div class="access-info">
                <span class="access-label">東京駅起点の参考料金</span>
                <span class="access-value" id="acc-cost">—</span>
              </div>
            </div>
            <div class="access-row">
              <span class="access-icon">📍</span>
              <div class="access-info">
                <span class="access-label">最寄り</span>
                <span class="access-value" id="acc-nearest">—</span>
              </div>
            </div>
          </div>
          <div class="access-section" id="tour-info-section" style="display:none;">
            <div class="access-title">🗓 見学情報</div>
            <div class="access-row">
              <span class="access-icon">💰</span>
              <div class="access-info">
                <span class="access-label">見学費用</span>
                <span class="access-value" id="tour-fee">—</span>
              </div>
            </div>
            <div class="access-row">
              <span class="access-icon">👥</span>
              <div class="access-info">
                <span class="access-label">見学人数</span>
                <span class="access-value" id="tour-capacity">—</span>
              </div>
            </div>
            <div class="access-row">
              <span class="access-icon">⏱</span>
              <div class="access-info">
                <span class="access-label">見学時間</span>
                <span class="access-value" id="tour-duration">—</span>
              </div>
            </div>
          </div>
          <div class="detail-actions">
            <a class="btn-official" id="detail-link" href="#" target="_blank" rel="noopener">🌐 公式サイトへ</a>
            <button class="btn-close" onclick="closeDetail()">✕</button>
          </div>
          <button class="delete-fac-btn" onclick="deleteCurrentFacility()">🗑 この施設を削除</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>施設を追加</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>施設名 *</label>
        <input type="text" id="f-name" placeholder="例：大谷資料館">
      </div>
      <div class="form-group">
        <label>カテゴリ</label>
        <select id="f-cat">
          <option>文化・歴史</option>
          <option>建築・インフラ</option>
          <option>産業・工場</option>
          <option>環境・土木</option>
          <option>スポーツ・レクリエーション</option>
          <option>行政・司法</option>
          <option>その他</option>
        </select>
      </div>
      <div class="form-group">
        <label>推しポイント（一言）</label>
        <input type="text" id="f-tagline" placeholder="例：地下に広がる幻想的な石の大空間">
      </div>
      <div class="form-group">
        <label>公式サイト URL</label>
        <input type="url" id="f-url" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>画像 URL（任意）</label>
        <input type="url" id="f-img" placeholder="https://... （省略可）">
      </div>
      <div class="form-group">
        <label>アイコン（絵文字 1文字）</label>
        <input type="text" id="f-emoji" placeholder="例：🏛" maxlength="4">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>緯度 *</label>
          <input type="number" id="f-lat" placeholder="例：36.5789" step="0.0001">
        </div>
        <div class="form-group">
          <label>経度 *</label>
          <input type="number" id="f-lng" placeholder="例：139.8989" step="0.0001">
        </div>
      </div>
      <div class="form-group">
        <label>交通手段（東京駅から）</label>
        <input type="text" id="f-transport" placeholder="例：東北新幹線→宇都宮線">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>所要時間</label>
          <input type="text" id="f-time" placeholder="例：約1時間30分">
        </div>
        <div class="form-group">
          <label>料金目安</label>
          <input type="text" id="f-cost" placeholder="例：約3,000円">
        </div>
      </div>
      <div class="form-group">
        <label>最寄り駅・バス停</label>

const VOTE_KEY = 'facility_votes_v1';
let votes = (()=>{ try { return JSON.parse(localStorage.getItem(VOTE_KEY)||'{}'); } catch(e){return{};} })();
let currentFacId = null;

const map = L.map('map', { center: [36.2, 137.5], zoom: 6, zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '©OpenStreetMap contributors ©CARTO', maxZoom: 19
}).addTo(map);

function mkIcon(fac, sel) {
  const bg = sel ? '#c0392b' : '#1c1a14';
  const sc = sel ? 'scale(1.15)' : 'scale(1)';
  return L.divIcon({
    className: '',
    html: `<div style="width:30px;height:30px;background:${bg};border:2.5px solid white;border-radius:50% 50% 50% 0;transform:rotate(-45deg) ${sc};box-shadow:0 2px 8px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;"><span style="transform:rotate(45deg);font-size:12px;">${fac.emoji||'📍'}</span></div>`,
    iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -34]
  });
}

function addMarker(fac) {
  const m = L.marker([fac.lat, fac.lng], { icon: mkIcon(fac, false), title: fac.name }).addTo(map);
  m.on('click', () => selectFacility(fac.id));
  markers[fac.id] = m;
}

function selectFacility(id) {
  if (selectedId && markers[selectedId]) {
    const p = facilities.find(f => f.id === selectedId);
    if (p) markers[selectedId].setIcon(mkIcon(p, false));
  }
  selectedId = id;
  const fac = facilities.find(f => f.id === id);
  if (!fac) return;
  markers[id].setIcon(mkIcon(fac, true));
  map.panTo([fac.lat, fac.lng], { animate: true, duration: 0.5 });
  // Refresh list highlight
  document.querySelectorAll('.list-item').forEach(el => el.classList.remove('selected'));
  const listView = document.getElementById('list-view');
  listView.querySelectorAll('.list-item').forEach(el => {
    if (el.onclick && el.onclick.toString().includes(String(id))) el.classList.add('selected');
  });
  // Re-render list to update selected state properly
  renderList();
  showDetail(fac);
}

function showDetail(fac) {
  currentFacId = fac.id;
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-placeholder').style.display = 'none';
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('detail-panel').classList.add('active');
  document.getElementById('detail-name').textContent = fac.name;
  document.getElementById('detail-cat').textContent = fac.cat || '施設';
  document.getElementById('detail-tagline').textContent = fac.tagline || '';
  document.getElementById('detail-link').href = fac.url || '#';
  updateHeartUI(fac.id);
  document.getElementById('acc-transport').textContent = fac.transport || '—';
  document.getElementById('acc-time').textContent = fac.time || '';
  document.getElementById('acc-cost').textContent = fac.cost || '—';
  document.getElementById('acc-nearest').textContent = fac.nearest || '—';
  // Tour info section
  const tourSection = document.getElementById('tour-info-section');
  const hasTourInfo = fac.fee || fac.capacity || fac.duration;
  tourSection.style.display = hasTourInfo ? '' : 'none';
  document.getElementById('tour-fee').textContent = fac.fee || '—';
  document.getElementById('tour-capacity').textContent = fac.capacity || '—';
  document.getElementById('tour-duration').textContent = fac.duration || '—';
  const img = document.getElementById('detail-img');
  const ph = document.getElementById('detail-img-placeholder');
  ph.textContent = fac.emoji || '🏛';
  if (fac.img) { ph.style.display = 'flex'; img.style.display = 'none'; img.src = fac.img; }
  else { img.style.display = 'none'; ph.style.display = 'flex'; }
}

function closeDetail() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('active');
  if (selectedId && markers[selectedId]) {
    const p = facilities.find(f => f.id === selectedId);
    if (p) markers[selectedId].setIcon(mkIcon(p, false));
  }
  selectedId = null;
  renderList(); // restores list view
}

// ── Sort & Filter ──
function setSort(mode, btn) {
  currentSort = mode;
  document.querySelectorAll('.fsort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function setArea(area, btn) {
  activeArea = area;
  document.querySelectorAll('.farea-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
  // Fade unmatched markers
  Object.entries(markers).forEach(([id, m]) => {
    const f = facilities.find(f => f.id == id);
    const visible = area === 'all' || (f && f.area === area);
    m.setOpacity(visible ? 1 : 0.25);
  });
}

function getSortedFiltered() {
  let list = [...facilities];
  if (activeArea !== 'all') list = list.filter(f => f.area === activeArea);
  if (currentSort === 'name') list.sort((a,b) => a.name.localeCompare(b.name, 'ja'));
  else if (currentSort === 'area') list.sort((a,b) => (a.area||'').localeCompare(b.area||'', 'ja'));
  else if (currentSort === 'cat') list.sort((a,b) => (a.cat||'').localeCompare(b.cat||'', 'ja'));
  else if (currentSort === 'vote') list.sort((a,b) => (votes[b.id]||0) - (votes[a.id]||0));
  return list;
}

function buildAreaFilters() {
  const areas = ['all', ...new Set(facilities.map(f => f.area).filter(Boolean))];
  const wrap = document.getElementById('area-filters');
  wrap.innerHTML = areas.map(a => {
    const label = a === 'all' ? 'すべて' : a;
    const active = a === activeArea ? 'active' : '';
    return `<button class="farea-btn ${active}" onclick="setArea('${a}',this)">${label}</button>`;
  }).join('');
}

function renderList() {
  const listView = document.getElementById('list-view');
  const placeholder = document.getElementById('sidebar-placeholder');
  const detailPanel = document.getElementById('detail-panel');

  // Always show list when sort is active
  listView.style.display = 'flex';
  placeholder.style.display = 'none';
  if (!selectedId) detailPanel.classList.remove('active');

  const list = getSortedFiltered();
  if (list.length === 0) {
    listView.innerHTML = '<div style="padding:2rem;text-align:center;font-size:13px;color:var(--ink-light);">該当する施設がありません</div>';
    return;
  }

  if (currentSort === 'vote') {
    // 人気順: スコアでグループ
    const groups = {};
    list.forEach(f => { const s = votes[f.id] || 0; (groups[s] = groups[s]||[]).push(f); });
    const keys = Object.keys(groups).map(Number).sort((a,b)=>b-a);
    let rank = 1;
    listView.innerHTML = keys.map(score => {
      const label = score === 0 ? '未評価' : '♥'.repeat(score) + '♡'.repeat(7-score);
      const html = `<div class="list-group-header">${label}</div>` +
        groups[score].map((f,i) => listItemHTML(f, score===0 ? null : rank+i)).join('');
      rank += groups[score].length;
      return html;
    }).join('');
  } else if (currentSort === 'area' || currentSort === 'cat') {
    const key = currentSort === 'area' ? 'area' : 'cat';
    const groups = {};
    list.forEach(f => { const g = f[key] || 'その他'; (groups[g] = groups[g]||[]).push(f); });
    listView.innerHTML = Object.entries(groups).map(([grp, items]) =>
      `<div class="list-group-header">${grp}</div>` +
      items.map(f => listItemHTML(f)).join('')
    ).join('');
  } else {
    listView.innerHTML = list.map(f => listItemHTML(f)).join('');
  }
}

function listItemHTML(fac, rank) {
  const sel = fac.id === selectedId ? 'selected' : '';
  const score = votes[fac.id] || 0;
  const heartsHtml = [1,2,3,4,5,6,7].map(i => `<span style="color:${i<=score?'#e74c3c':'#ddd'}">${i<=score?'♥':'♡'}</span>`).join('');
  const rankHtml = (rank != null) ? `<span class="list-rank">${rank === 0 ? '🏆' : rank+'.'}</span>` : '';
  return `<div class="list-item ${sel}" onclick="selectFacility(${fac.id})">
    ${rankHtml}
    <span class="list-item-emoji">${fac.emoji||'📍'}</span>
    <div class="list-item-info">
      <div class="list-item-name">${fac.name}</div>
      <div class="list-item-sub">${fac.area||''} · ${fac.cat||''}</div>
    </div>
    <span class="list-item-hearts">${heartsHtml}</span>
  </div>`;
}

// ── Voting ──
function updateHeartUI(facId) {
  const score = votes[facId] || 0;
  document.querySelectorAll('#heart-input .heart').forEach(el => {
    const v = parseInt(el.dataset.v);
    el.textContent = v <= score ? '♥' : '♡';
    el.className = 'heart ' + (v <= score ? 'heart-filled' : 'heart-empty');
  });
  const label = document.getElementById('heart-score-label');
  label.textContent = score > 0 ? `${score}/7` : '未評価';
}

function setVote(facId, score) {
  if (!facId) return;
  // 同じスコアを再クリックで取り消し
  if (votes[facId] === score) {
    delete votes[facId];
  } else {
    votes[facId] = score;
  }
  try { localStorage.setItem(VOTE_KEY, JSON.stringify(votes)); } catch(e) {}
  updateHeartUI(facId);
  renderList(); // リスト側のハートも更新
}

// ホバープレビュー
document.addEventListener('mouseover', e => {
  const h = e.target.closest('#heart-input .heart');
  if (!h) return;
  const v = parseInt(h.dataset.v);
  document.querySelectorAll('#heart-input .heart').forEach(el => {
    el.textContent = parseInt(el.dataset.v) <= v ? '♥' : '♡';
  });
});
document.addEventListener('mouseout', e => {
  if (!e.target.closest('#heart-input')) return;
  if (!e.relatedTarget || !e.relatedTarget.closest('#heart-input')) {
    updateHeartUI(currentFacId);
  }
});

function renderAll() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  facilities.forEach(addMarker);
  document.getElementById('fac-count').textContent = facilities.length + ' 件';
  buildAreaFilters();
  renderList();
}

function openModal() { document.getElementById('modal-overlay').classList.add('active'); }
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  ['f-name','f-tagline','f-url','f-img','f-emoji','f-lat','f-lng','f-transport','f-time','f-cost','f-nearest','f-fee','f-capacity','f-duration']
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
}

function addFacility() {
  const name = document.getElementById('f-name').value.trim();
  const lat = parseFloat(document.getElementById('f-lat').value);
  const lng = parseFloat(document.getElementById('f-lng').value);
  if (!name) { alert('施設名を入力してください'); return; }
  if (isNaN(lat) || isNaN(lng)) { alert('緯度・経度を入力してください'); return; }
  const fac = {
    id: Date.now(), name, lat, lng,
    cat: document.getElementById('f-cat').value,
    tagline: document.getElementById('f-tagline').value.trim(),
    url: document.getElementById('f-url').value.trim(),
    img: document.getElementById('f-img').value.trim(),
    emoji: document.getElementById('f-emoji').value.trim() || '📍',
    transport: document.getElementById('f-transport').value.trim(),
    time: document.getElementById('f-time').value.trim(),
    cost: document.getElementById('f-cost').value.trim(),
    nearest: document.getElementById('f-nearest').value.trim(),
    fee: document.getElementById('f-fee').value.trim(),
    capacity: document.getElementById('f-capacity').value.trim(),
    duration: document.getElementById('f-duration').value.trim()
  };
  facilities.push(fac);
  saveFacilities(facilities);
  renderAll();
  closeModal();
  setTimeout(() => selectFacility(fac.id), 80);
}

function deleteCurrentFacility() {
  if (!selectedId) return;
  const fac = facilities.find(f => f.id === selectedId);
  if (!fac || !confirm(`「${fac.name}」を削除しますか？`)) return;
  facilities = facilities.filter(f => f.id !== selectedId);
  saveFacilities(facilities);
  closeDetail();
  renderAll();
}

renderAll();
</script>
</body>
</html>
